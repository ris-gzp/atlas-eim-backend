server:
  port: 8080

spring:

  application:
    name: enterprise-identity-manager

  data:
    mongodb:
      uri: mongodb://localhost:27017/iam_control_plane_test

management:

  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      show-details: always

aws:

  region: ap-south-1

  cognito:
    region: ap-south-1
    user-pool-id: ap-south-1_xxxxxxxx
    client-id: xxxxxxxxxxxxxxxxx

  ses:
    from-address: noreply@yourdomain.com

logging:
  level:
    root: INFO
